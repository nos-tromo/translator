#################################
# Docker Compose for Translator Application
# This configuration sets up a backend service using FastAPI and a frontend service using Streamlit.
# It also defines shared volumes for logging and networks for inter-service communication.
#################################
name: translator

x-env-file: &env-file
  - .env

services:
  #############################
  # Backend (FastAPI)
  #############################
  backend:
    image: translator-backend:${TRANSLATOR_VERSION:-latest}
    build:
      context: .
      dockerfile: Dockerfile.backend
    ports:
      - "8000:8000"
    environment:
      LOG_PATH: /var/log/translator/backend.log
      OPENAI_API_BASE: ${OPENAI_API_BASE}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      TRANSLATE_MODEL: ${TRANSLATE_MODEL:-translategemma:4b}
    env_file: *env-file
    volumes:
      - translator-logs:/var/log/translator
    networks:
      translator-net:
        aliases:
          - backend
      inference-net:

  #############################
  # Frontend (Streamlit)
  #############################
  frontend:
    image: translator-frontend:${TRANSLATOR_VERSION:-latest}
    build:
      context: .
      dockerfile: Dockerfile.frontend
    ports:
      - "${TRANSLATOR_HOST_PORT:-8501}:8501"
    environment:
      LOG_PATH: /var/log/translator/frontend.log
      BACKEND_URL: http://backend:8000
      STREAMLIT_BROWSER_GATHER_USAGE_STATS: "false"
      DEFAULT_TARGET_LANGUAGE: ${DEFAULT_TARGET_LANGUAGE:-English}
    env_file: *env-file
    volumes:
      - translator-logs:/var/log/translator
    networks:
      translator-net:
    depends_on:
      - backend

#############################
# Volumes
#############################
volumes:
  translator-logs:

#############################
# Networks
#############################
networks:
  translator-net:
  inference-net:
    external: true
    name: ${INFERENCE_NETWORK:-inference-net}