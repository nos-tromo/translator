repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.14
    hooks:
      - id: ruff-check
        args: ["--fix", "--exit-non-zero-on-fix"]
      - id: ruff-format

  # mypy is a local hook so it uses the project venv — strict mode needs
  # to see every dep's decorators/base classes (FastAPI, openai, the
  # OpenAI SDK, etc.); pre-commit's isolated env can't keep up.
  # Pinned to mypy==<canonical> in dev deps; canonical at
  # nos-tromo/.github/configs/python-strict/precommit-versions.yaml.
  - repo: local
    hooks:
      - id: mypy
        name: mypy
        entry: uv run mypy
        language: system
        types: [python]
        require_serial: true
        pass_filenames: false
        args: ["."]