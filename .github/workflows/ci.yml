name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    # Pinned to v2.4 (adds the make/common.mk drift-check alongside strict-config
    # alignment; nos-tromo style tuning: line-length=120, ANN401 ignored, local
    # mypy hook). Canonical configs at
    # nos-tromo/.github/configs/{python-strict,make-common}/.
    uses: nos-tromo/.github/.github/workflows/python-app-ci.yml@v2.4
    with:
      python-versions: '["3.11"]'
      uv-sync-args: '--frozen --group dev'
      docker-build: true
      test-env: |
        OPENAI_API_BASE=http://test-host:11434/v1
