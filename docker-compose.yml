services:
  #############################
  # Backend (FastAPI)
  #############################
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    ports:
      - "8000:8000"
    environment:
      LOG_PATH: /var/log/translator/backend.log
      OPENAI_API_BASE: ${OPENAI_API_BASE:-http://ollama:11434/v1}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-ollama}
      TRANSLATE_MODEL: ${TRANSLATE_MODEL:-translategemma:4b}
    volumes:
      - translator-logs:/var/log/translator
    networks:
      translator-net:
        aliases:
          - backend-net
      inference-net:

  #############################
  # Frontend (Streamlit)
  #############################
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    ports:
      - "8501:8501"
    environment:
      LOG_PATH: /var/log/translator/frontend.log
      BACKEND_URL: http://backend-net:8000
      STREAMLIT_BROWSER_GATHER_USAGE_STATS: "false"
    depends_on:
      - backend
    volumes:
      - translator-logs:/var/log/translator
    networks:
      translator-net:

#############################
# Volumes
#############################
volumes:
  translator-logs:

#############################
# Networks
#############################
networks:
  translator-net:
  inference-net:
    external: true
    name: ${INFERENCE_NETWORK:-inference-net}