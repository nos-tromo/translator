[project]
name = "translator"
version = "0.1.0"
description = "Simple translation tool."
authors = [
  { name = "nos-tromo" }
]
readme = "README.md"
requires-python = ">=3.11,<4"
dependencies = [
    "dotenv>=0.9.9",
    "emoji-country-flag>=2.1.0",
    "fastapi>=0.136.0",
    "langcodes[data]>=3.5.1",
    "langdetect>=1.0.9",
    "loguru>=0.7.3",
    "openai>=2.32.0",
    "pycountry>=26.2.16",
    "pydantic>=2.13.2",
    "requests>=2.33.1",
    "streamlit>=1.56.0",
    "types-requests>=2.33.0.20260408",
    "uvicorn>=0.44.0",
]

[dependency-groups]
dev = [
    "mypy>=1.20.1",
    "pre-commit>=4.5.1",
    "pytest>=9.0.3",
    "ruff>=0.15.11",
]

[build-system]
requires = ["setuptools>=82.0.1", "wheel"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
where = ["."]
include = ["translator*"]

[tool.pytest.ini_options]
testpaths = ["tests"]

[tool.uv]
package = true

[tool.uv.sources]
docint = { workspace = true }
