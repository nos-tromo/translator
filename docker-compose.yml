#################################
# Docker Compose for Translator Application
# This configuration sets up a backend service using FastAPI and a frontend service using Streamlit.
# It also defines shared volumes for logging and networks for inter-service communication.
#################################
x-proxy-env: &proxy-env
  HTTP_PROXY: ${HTTP_PROXY:-}
  HTTPS_PROXY: ${HTTPS_PROXY:-}
  NO_PROXY: ${NO_PROXY:-}
  http_proxy: ${http_proxy:-}
  https_proxy: ${https_proxy:-}
  no_proxy: ${no_proxy:-}

x-base-image-build-env: &base-image-build-env
  PYTHON_SLIM_BOOKWORM_IMAGE: ${PYTHON_SLIM_BOOKWORM_IMAGE:-python:3.11.12-slim-bookworm}

x-build-args: &build-args
  <<: [*proxy-env, *base-image-build-env]

services:
  #############################
  # Backend (FastAPI)
  #############################
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    ports:
      - "8000:8000"
    environment:
      <<: *proxy-env
      LOG_PATH: /var/log/translator/backend.log
      OPENAI_API_BASE: ${OPENAI_API_BASE}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      TRANSLATE_MODEL: ${TRANSLATE_MODEL:-translategemma:4b}
    volumes:
      - translator-logs:/var/log/translator
    networks:
      translator-net:
        aliases:
          - backend
      inference-net:

  #############################
  # Frontend (Streamlit)
  #############################
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    ports:
      - "8501:8501"
    environment:
      <<: *proxy-env
      LOG_PATH: /var/log/translator/frontend.log
      BACKEND_URL: http://backend:8000
      STREAMLIT_BROWSER_GATHER_USAGE_STATS: "false"
      DEFAULT_TARGET_LANGUAGE: ${DEFAULT_TARGET_LANGUAGE:-English}
    depends_on:
      - backend
    volumes:
      - translator-logs:/var/log/translator
    networks:
      translator-net:

#############################
# Volumes
#############################
volumes:
  translator-logs:

#############################
# Networks
#############################
networks:
  translator-net:
  inference-net:
    external: true
    name: ${INFERENCE_NETWORK:-inference-net}