
# Proxy target URI: strip the /translator prefix from the RAW request URI so
# percent-encoding survives ($uri would arrive decoded and un-re-encoded;
# $request_uri would keep the prefix the backend doesn't know).
# $request_uri includes the query string, so no $is_args$args needed.
map $request_uri $proxy_uri {
    ~^/translator(?<rest>/.+)$ $rest;
    default $request_uri;
}

server {
    listen 80;
    server_name _;
    resolver 127.0.0.11 valid=30s ipv6=off;
    root /usr/share/nginx/html;

    set $backend_upstream "backend:8000";

    # Canonical sub-path: strip the /translator prefix so the existing
    # root-anchored locations below apply unchanged. (/.+ not /.*: the
    # bare prefix must fall through to the SPA fallback, not rewrite to
    # "/" and loop through the redirect below.)
    rewrite ^/translator(/.+)$ $1;

    # Convenience for direct (dev) access; via the gateway requests
    # always arrive prefixed.
    location = / {
        return 302 /translator/;
    }

    # All API calls proxy same-origin to the FastAPI backend.
    location /api/ {
        include /etc/nginx/security-headers.conf;
        proxy_pass http://$backend_upstream$proxy_uri;
        proxy_set_header Host $host;
    }

    # Hashed, immutable build assets.
    location /assets/ {
        include /etc/nginx/security-headers.conf;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        try_files $uri =404;
    }

    # SPA fallback for client-side routing.
    location / {
        include /etc/nginx/security-headers.conf;
        add_header Cache-Control "no-cache, must-revalidate" always;
        try_files $uri /index.html;
    }
}
