services:
  #############################
  # Backend (FastAPI)
  #############################
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - INFERENCE_API_BASE_URL=${INFERENCE_API_BASE_URL}
      - INFERENCE_API_KEY=${INFERENCE_API_KEY:-dummy}
      - INFERENCE_MODEL=${INFERENCE_MODEL:-google/translate-gemma-2b-it}

  #############################
  # Frontend (Streamlit)
  #############################
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "8501:8501"
    environment:
      - BACKEND_URL=http://backend:8000
    depends_on:
      - backend
