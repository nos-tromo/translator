name: release-tag
# Mints the annotated vX.Y.Z tag on merge to main by reading pyproject.toml's
# [project].version via the shared reusable workflow. Idempotent: no-op unless
# the version changed. See nos-tromo/.github actions/release-tag.
on:
  push:
    branches: [main]
permissions:
  contents: write        # a reusable workflow's token perms come from the caller
concurrency:
  group: release-tag-${{ github.ref }}
jobs:
  tag:
    uses: nos-tromo/.github/.github/workflows/release-tag.yml@v3
    with:
      version-file: pyproject.toml
