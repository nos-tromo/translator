name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    # Pinned to v1 (latest stable v1.x.y).
    uses: nos-tromo/.github/.github/workflows/python-app-ci.yml@v1
    with:
      python-versions: '["3.11"]'
      uv-sync-args: '--frozen --group dev'
      docker-build: true
      test-env: |
        OPENAI_API_BASE=http://test-host:11434/v1
