repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.14
    hooks:
      - id: ruff-check
        args: ["--fix", "--exit-non-zero-on-fix"]
      - id: ruff-format

  # pyrefly is a local hook so it uses the project venv — resolving every dep's
  # types (FastAPI, the OpenAI SDK, pydantic, etc.) needs the installed deps;
  # pre-commit's isolated env can't keep up. Pinned to pyrefly==<canonical> in
  # dev deps; canonical at
  # nos-tromo/.github/configs/python-strict/precommit-versions.yaml.
  - repo: local
    hooks:
      - id: pyrefly
        name: pyrefly
        entry: uv run pyrefly check
        language: system
        types: [python]
        require_serial: true
        pass_filenames: false