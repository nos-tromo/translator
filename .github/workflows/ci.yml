name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    # Pinned to v2.3 (strict-config alignment + nos-tromo style tuning:
    # line-length=120, ANN401 ignored, local mypy hook; v2.3 fixes
    # github.job_workflow_ref usage in the lint job). Canonical at
    # nos-tromo/.github/configs/python-strict/.
    uses: nos-tromo/.github/.github/workflows/python-app-ci.yml@v2.3
    with:
      python-versions: '["3.11"]'
      uv-sync-args: '--frozen --group dev'
      docker-build: true
      test-env: |
        OPENAI_API_BASE=http://test-host:11434/v1
