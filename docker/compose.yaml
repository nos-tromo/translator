### translator app compose — app services only.
###
### No persistent state lives in this project, and no volumes are
### declared — `docker compose down -v` is always safe.
###
### Production shape: no host ports. The dev overlay in
### compose.override.yaml publishes ports for local browsing; production
### deploys front the frontend with the existing reverse proxy.

name: translator

x-no-proxy-env: &no-proxy-env
  NO_PROXY: "backend,frontend,localhost,127.0.0.1,172.16.0.0/12,10.0.0.0/8${EXTRA_NO_PROXY:-}"
  no_proxy: "backend,frontend,localhost,127.0.0.1,172.16.0.0/12,10.0.0.0/8${EXTRA_NO_PROXY:-}"

x-env-file: &env-file
  - path: ../.env
    required: false

##########################################################
# Shared logging — the local driver rotates and compresses
# per-container; tail with `docker compose logs -f <svc>`.
##########################################################
x-logging: &default-logging
  driver: "local"
  options:
    max-size: "50m"
    max-file: "5"
    compress: "true"

services:
  backend:
    image: translator-backend:${TRANSLATOR_VERSION:-latest}
    build:
      context: ..
      dockerfile: docker/Dockerfile.backend
    logging: *default-logging
    environment:
      <<: *no-proxy-env
      OPENAI_API_BASE: ${OPENAI_API_BASE}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-dummy}
      TRANSLATE_MODEL: ${TRANSLATE_MODEL:-google/translate-gemma-2b-it}
    env_file: *env-file
    networks:
      translator-net:
        aliases:
          - backend
      inference-net:
        aliases:
          - translator-backend
    expose:
      - "8000"
    healthcheck:
      # Liveness: uvicorn serving /api/v1/health is exactly when the frontend
      # can safely proxy. python3 urllib avoids adding curl to the image;
      # start_interval marks it healthy ~5s after boot (Docker >=25) instead
      # of at the first 30s probe.
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/health').read()"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
      start_interval: 3s
    restart: unless-stopped

  frontend:
    image: translator-frontend:${TRANSLATOR_VERSION:-latest}
    build:
      context: ..
      dockerfile: docker/Dockerfile.frontend
      args:
        VITE_DEFAULT_TARGET_LANGUAGE: ${DEFAULT_TARGET_LANGUAGE:-English}
    logging: *default-logging
    environment:
      <<: *no-proxy-env
    networks:
      translator-net:
    depends_on:
      backend:
        condition: service_healthy
    expose:
      - "80"
    restart: unless-stopped

networks:
  translator-net: {}
  inference-net:
    external: true
    name: ${INFERENCE_NETWORK:-inference-net}
